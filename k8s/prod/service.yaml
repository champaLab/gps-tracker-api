apiVersion: v1
kind: Service
metadata:
  name: gps-tracker-api-service
  namespace: prod
spec:
  selector:
    app: gps-tracker-api
  type: NodePort
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ports:
    - name: gps-tracker-api-port
      protocol: TCP
      port: 80
      targetPort: 31111
      nodePort: 31111
